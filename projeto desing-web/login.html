<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Entrar - NexuSaldo</title>
    <link rel="icon" type="image/png" href="img/favicon-ns.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/estilo-acessos.css" media="all">
</head>

<body>

    <div class="acesso-container">

        <a href="index.html">
            <img class="logo-acesso" src="img/logo_ns.png" alt="logo_NexuSaldo">
        </a>

        <h1 class="titulo-acesso">Acesse sua Conta</h1>
        <p class="subtitulo-acesso">Bem-vindo(a) de volta ao seu painel financeiro.</p>

        <form action="index.html" method="POST">
            <div class="form-grupo">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-grupo">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>

            <button type="submit" class="btn-acesso btn-submit">Entrar</button>
        </form>

        <a href="#" class="link-ajuda">Esqueceu sua senha?</a>

        <p class="acesso-footer">
            Não tem uma conta?
            <a href="cadastro.html" class="link-ajuda">Cadastre-se aqui</a>
        </p>
    </div>

</body>

</html>
